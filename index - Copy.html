<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APLIASI KEHADIRAN KEMENAG ENDE</title>
  <link rel="icon" href="https://cdn.kemenag.go.id/storage/archives/logo-kemenag-png-1png.png/>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100vh;
      background-color: #eee;
    }

    .iframe-container {
      width: 100%;
      min-height: 100vh;
      overflow: auto;
    }

    iframe {
      display: block;
      width: 100%;
      height: 100vh; /* tinggi dasar di desktop */
      border: none;
    }

    @media (max-width: 768px) {
      iframe {
        height: 1100px; /* tinggi fix untuk HP */
      }
    }
  </style>
</head>
<body>
  <div class="iframe-container">
    <iframe
      id="app"
      src="https://script.google.com/macros/s/AKfycbxMXvm0EiGBUlgGMjObihWA6SPH7X7gU4vYSg7gBoFwvIND7oZELF1uKedZcnM0oQ91/exec"
      scrolling="yes">
    </iframe>
  </div>
</body>
</html>
